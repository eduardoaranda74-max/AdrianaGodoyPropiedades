<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adriana Godoy Propiedades</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-dark" style="background-color: var(--azul);">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="#">
        <img src="img/logo.png" alt="Logo Adriana Godoy" height="52" class="logo-nav">
        <span class="fw-bold fs-5 d-none d-sm-inline">Adriana Godoy Propiedades</span>
      </a>
    </div>
  </nav>

  <!-- HERO BANNER -->
  <div class="hero-banner">
    <div class="hero-azul">
      <h1 class="hero-titulo">Encontrá tu propiedad ideal</h1>
    </div>
    <div class="hero-rojo">
      <p class="hero-subtitulo">Venta y alquiler en Pilar y zona norte</p>
    </div>
  </div>

  <!-- CONTENIDO -->
  <div class="container my-5">
    <p class="text-center text-muted mb-3" id="contador"></p>

    <!-- Filtros -->
    <div class="d-flex justify-content-center gap-2 mb-4 flex-wrap">
      <button class="btn btn-filtro filtro-activo" data-filtro="Todas">Todas</button>
      <button class="btn btn-filtro" data-filtro="Venta">Venta</button>
      <button class="btn btn-filtro" data-filtro="Alquiler">Alquiler</button>
    </div>

    <div id="contenedor-propiedades" class="row g-4">
      <div class="col-12 text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-2 text-muted">Cargando propiedades...</p>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer-custom py-4 mt-5">
    <div class="container text-center text-white">
      <img src="img/logo.png" alt="Logo" height="60" class="logo-nav mb-2">
      <p class="mb-0 small">© 2025 Adriana Godoy Propiedades</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
